<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Story Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --border-color: #334155;
            --tag-bg: #2563eb;
            --tag-text: #eff6ff;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            animation: fadeIn 1s ease;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        select, input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease backwards;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-hover);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .story-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .story-author {
            font-size: 0.875rem;
            color: var(--accent-color);
            font-weight: 500;
        }

        .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .status-ended {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-progress {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .tag {
            background-color: var(--tag-bg);
            color: var(--tag-text);
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 500;
        }

        .tag-model {
            background-color: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .tag-version {
            background-color: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background-color: var(--bg-color);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background-color: var(--surface-color);
            border-radius: 16px 16px 0 0;
        }

        .modal-title h2 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 2rem;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }

        .chapter {
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chapter:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .chapter h3 {
            font-size: 1.25rem;
            color: var(--accent-hover);
            margin-bottom: 0.5rem;
        }

        .chapter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .chapter-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .chapter-hook {
            font-style: italic;
            color: #a78bfa;
            border-left: 3px solid #a78bfa;
            padding-left: 1rem;
            margin-top: 1.5rem;
        }

        .chapter-meta {
            background-color: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .chapter-meta strong {
            color: var(--text-primary);
        }

        .chapter-short-text {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(167, 139, 250, 0.08));
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
            font-style: italic;
            color: #e2e8f0;
            line-height: 1.9;
            position: relative;
        }

        .chapter-short-text::before {
            content: '✦';
            position: absolute;
            top: -8px;
            left: 16px;
            background: var(--bg-color);
            padding: 0 6px;
            color: #a78bfa;
            font-style: normal;
            font-size: 0.85rem;
        }

        /* Toggle Characters Button */
        .toggle-characters-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-hover);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .toggle-characters-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-color);
        }

        .toggle-characters-btn .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
            font-size: 0.65rem;
        }

        .toggle-characters-btn.expanded .arrow {
            transform: rotate(90deg);
        }

        .characters-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .characters-content.visible {
            max-height: 500px;
            opacity: 1;
            margin-top: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>AI Story Hub</h1>
            <p class="subtitle">Khám phá các câu chuyện được tạo bởi Trí tuệ nhân tạo</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label for="searchFilter">Tìm kiếm</label>
                <input type="text" id="searchFilter" placeholder="Tên truyện hoặc nội dung...">
            </div>
            <div class="filter-group">
                <label for="authorFilter">Tác giả</label>
                <select id="authorFilter">
                    <option value="">Tất cả tác giả</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="genreFilter">Thể loại</label>
                <select id="genreFilter">
                    <option value="">Tất cả thể loại</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Trạng thái</label>
                <select id="statusFilter">
                    <option value="">Tất cả</option>
                    <option value="ended">Đã hoàn thành</option>
                    <option value="progress">Đang tiến hành</option>
                </select>
            </div>
        </div>

        <div id="storyGrid" class="grid">
            <div class="loading">Đang tải dữ liệu... Vui lòng chờ.</div>
        </div>
    </div>

    <!-- Modal cho Chi tiết truyện -->
    <div class="modal-overlay" id="storyModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <h2 id="modalStoryName">Tên Truyện</h2>
                    <div class="story-author" id="modalAuthorName">Tác giả</div>
                </div>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Nội dung các chương sẽ được render vào đây -->
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let storiesMap = new Map(); // story_id -> Story object
        
        // DOM Elements
        const storyGrid = document.getElementById('storyGrid');
        const searchFilter = document.getElementById('searchFilter');
        const authorFilter = document.getElementById('authorFilter');
        const genreFilter = document.getElementById('genreFilter');
        const statusFilter = document.getElementById('statusFilter');
        const modal = document.getElementById('storyModal');
        const closeModal = document.getElementById('closeModal');
        const modalStoryName = document.getElementById('modalStoryName');
        const modalAuthorName = document.getElementById('modalAuthorName');
        const modalBody = document.getElementById('modalBody');

        // Khởi tạo
        async function init() {
            try {
                const response = await fetch('chapters.json');
                if (!response.ok) throw new Error('Network response was not ok');
                rawData = await response.json();
                processData();
                populateFilters();
                renderGrid();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu:', error);
                storyGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>Không thể tải dữ liệu truyện</h3>
                        <p>Vui lòng đảm bảo file chapters.json tồn tại cùng thư mục và bạn đang chạy server (VD: python -m http.server).</p>
                    </div>
                `;
            }
        }

        // Xử lý dữ liệu thô thành Map các truyện
        function processData() {
            storiesMap.clear();
            
            rawData.forEach(chapter => {
                const id = chapter.story_id;
                if (!storiesMap.has(id)) {
                    storiesMap.set(id, {
                        id: id,
                        name: chapter.story_name || 'Truyện chưa có tên',
                        author: chapter.author_name,
                        genres: new Set(),
                        chapters: [],
                        isEnded: false,
                        models: new Set(),
                        promptVersions: new Set(),
                        lastUpdated: new Date()
                    });
                }
                
                const story = storiesMap.get(id);
                story.chapters.push(chapter);
                
                // Trạng thái (nếu bất kỳ chương nào báo ended thì truyện đó ended)
                if (chapter.is_ended) {
                    story.isEnded = true;
                }
                
                // Thu thập thể loại
                if (chapter.genre) {
                    if (Array.isArray(chapter.genre)) {
                        chapter.genre.forEach(g => story.genres.add(g));
                    } else if (typeof chapter.genre === 'string') {
                        chapter.genre.split(',').forEach(g => story.genres.add(g.trim()));
                    }
                }

                // Thu thập model & prompt_version
                if (chapter.model) story.models.add(chapter.model);
                if (chapter.prompt_version) story.promptVersions.add(chapter.prompt_version);
            });
            
            // Sắp xếp chương theo thứ tự
            storiesMap.forEach(story => {
                story.genresArray = Array.from(story.genres);
                story.modelsArray = Array.from(story.models);
                story.promptVersionsArray = Array.from(story.promptVersions);
            });
        }

        // Đổ dữ liệu vào các thẻ Select
        function populateFilters() {
            const authors = new Set();
            const genres = new Set();
            
            storiesMap.forEach(story => {
                authors.add(story.author);
                story.genresArray.forEach(g => genres.add(g));
            });
            
            Array.from(authors).sort().forEach(author => {
                const option = document.createElement('option');
                option.value = author;
                option.textContent = author;
                authorFilter.appendChild(option);
            });
            
            Array.from(genres).sort().forEach(genre => {
                if(!genre) return;
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                genreFilter.appendChild(option);
            });
        }

        // Lọc truyện
        function filterStories() {
            const searchTerm = searchFilter.value.toLowerCase();
            const author = authorFilter.value;
            const genre = genreFilter.value;
            const status = statusFilter.value;
            
            const result = [];
            
            storiesMap.forEach(story => {
                const matchSearch = story.name.toLowerCase().includes(searchTerm) || 
                                    story.chapters.some(c => c.story_text && c.story_text.toLowerCase().includes(searchTerm));
                const matchAuthor = author === '' || story.author === author;
                const matchGenre = genre === '' || story.genresArray.includes(genre);
                
                let matchStatus = true;
                if (status === 'ended') matchStatus = story.isEnded;
                if (status === 'progress') matchStatus = !story.isEnded;
                
                if (matchSearch && matchAuthor && matchGenre && matchStatus) {
                    result.push(story);
                }
            });
            
            return result;
        }

        // Render lưới truyện
        function renderGrid() {
            const stories = filterStories();
            storyGrid.innerHTML = '';
            
            if (stories.length === 0) {
                storyGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>Không tìm thấy truyện nào</h3>
                        <p>Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm.</p>
                    </div>
                `;
                return;
            }
            
            stories.forEach((story, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                const statusClass = story.isEnded ? 'status-ended' : 'status-progress';
                const statusText = story.isEnded ? 'Hoàn thành' : 'Đang viết';
                
                // Genre tags
                const tagsHtml = story.genresArray.slice(0, 3).map(g => `<span class="tag">${g}</span>`).join('');
                const extraTags = story.genresArray.length > 3 ? `<span class="tag">+${story.genresArray.length - 3}</span>` : '';
                
                // Model & Version tags
                const modelTags = story.modelsArray.map(m => `<span class="tag tag-model">🤖 ${m}</span>`).join('');
                const versionTags = story.promptVersionsArray.map(v => `<span class="tag tag-version">v${v}</span>`).join('');
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <h3 class="story-title">${story.name}</h3>
                            <div class="story-author">${story.author}</div>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="tags">
                        ${tagsHtml}${extraTags}
                        ${modelTags}
                        ${versionTags}
                    </div>
                    <div class="card-footer">
                        <span>${story.chapters.length} Chương</span>
                        <span>ID: ${story.id.split('_')[1] || story.id}</span>
                    </div>
                `;
                
                card.addEventListener('click', () => openModal(story));
                storyGrid.appendChild(card);
            });
        }

        // Mở Modal xem chi tiết
        function openModal(story) {
            modalStoryName.textContent = story.name;
            modalAuthorName.textContent = story.author;
            
            modalBody.innerHTML = '';
            
            story.chapters.forEach((chapter, index) => {
                const chDiv = document.createElement('div');
                chDiv.className = 'chapter';
                
                // Chapter-level model & version tags
                let chapterTagsHtml = '';
                if (chapter.model || chapter.prompt_version) {
                    chapterTagsHtml = '<div class="chapter-tags">';
                    if (chapter.model) chapterTagsHtml += `<span class="tag tag-model">🤖 ${chapter.model}</span>`;
                    if (chapter.prompt_version) chapterTagsHtml += `<span class="tag tag-version">v${chapter.prompt_version}</span>`;
                    chapterTagsHtml += '</div>';
                }

                // Short text (intro/summary) - chỉ hiển thị khi không rỗng
                let shortTextHtml = '';
                if (chapter.short_text && chapter.short_text.trim() !== '') {
                    shortTextHtml = `
                        <div class="chapter-short-text">
                            ${chapter.short_text}
                        </div>
                    `;
                }

                // Characters toggle (hidden by default)
                let charactersHtml = '';
                if (chapter.characters) {
                    const toggleId = `char-toggle-${story.id}-${index}`;
                    const contentId = `char-content-${story.id}-${index}`;
                    charactersHtml = `
                        <button class="toggle-characters-btn" onclick="toggleCharacters(event, '${toggleId}', '${contentId}')" id="${toggleId}">
                            <span class="arrow">▶</span> Nhân vật
                        </button>
                        <div class="characters-content" id="${contentId}">
                            <div class="chapter-meta">
                                <strong>Nhân vật:</strong> ${chapter.characters}
                            </div>
                        </div>
                    `;
                }

                chDiv.innerHTML = `
                    <h3>${chapter.chapter_name || `Chương ${index + 1}`}</h3>
                    ${chapterTagsHtml}
                    ${shortTextHtml}
                    <div class="chapter-content">${chapter.story_text || 'Không có nội dung'}</div>
                    ${chapter.hook ? `<div class="chapter-hook">${chapter.hook}</div>` : ''}
                    ${charactersHtml}
                `;
                modalBody.appendChild(chDiv);
            });
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Toggle Characters visibility
        function toggleCharacters(event, toggleId, contentId) {
            event.stopPropagation();
            const btn = document.getElementById(toggleId);
            const content = document.getElementById(contentId);
            
            btn.classList.toggle('expanded');
            content.classList.toggle('visible');
        }

        // Đóng Modal
        function closeStoryModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Event Listeners
        searchFilter.addEventListener('input', renderGrid);
        authorFilter.addEventListener('change', renderGrid);
        genreFilter.addEventListener('change', renderGrid);
        statusFilter.addEventListener('change', renderGrid);
        
        closeModal.addEventListener('click', closeStoryModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeStoryModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeStoryModal();
            }
        });

        // Khởi động
        init();
    </script>
</body>
</html>
